<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>History Pesanan</title>

    <!-- BOOTSTRAP -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- DATATABLES -->
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"
    />

    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.bootstrap5.min.css"
    />

    <style>
      body {
        background: #111;
        color: white;
      }

      .table-container {
        background: #1c1c1c;
        padding: 20px;
        border-radius: 12px;
      }

      table.dataTable tbody td {
        vertical-align: top;
      }

      .order-text {
        white-space: pre-line;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <div class="container-fluid p-3">
      <!-- HEADER -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="m-0">📜 History Pesanan</h4>

        <a href="kds.html" class="btn btn-secondary"> ← Kembali ke KDS </a>
      </div>

      <!-- TABLE -->
      <div class="table-container">
        <table
          id="historyTable"
          class="table table-dark table-striped table-bordered w-100"
        >
          <thead>
            <tr>
              <th>No</th>
              <th>Queue</th>
              <th>Customer</th>
              <th>Order</th>
              <th>Type</th>
              <th>Status</th>
              <th>Created</th>
            </tr>
          </thead>

          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- JQUERY -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- DATATABLES -->
    <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

    <script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

    <script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

    <script src="https://cdn.datatables.net/responsive/2.5.0/js/responsive.bootstrap5.min.js"></script>

    <!-- HISTORY JS -->
    <script type="module" src="assets/js/history.js"></script>
  </body>
</html>
