<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard Admin</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <!-- HEADER -->
      <div class="text-center mb-5">
        <h1 class="fw-bold">Dashboard Admin</h1>

        <p class="text-muted">Kelola sistem POS & KDS</p>
      </div>

      <!-- MENU -->
      <div class="row g-4">
        <!-- POS -->
        <div class="col-md-6">
          <div class="card shadow-sm border-0 h-100">
            <div class="card-body text-center p-4">
              <h3 class="fw-bold">POS</h3>

              <p class="text-muted">Halaman input pesanan kasir</p>

              <a href="pos.html" class="btn btn-primary w-100"> Buka POS </a>
            </div>
          </div>
        </div>

        <!-- KDS -->
        <div class="col-md-6">
          <div class="card shadow-sm border-0 h-100">
            <div class="card-body text-center p-4">
              <h3 class="fw-bold">Kitchen Display System</h3>

              <p class="text-muted">Monitor realtime dapur</p>

              <a href="kds.html" class="btn btn-dark w-100"> Buka KDS </a>
            </div>
          </div>
        </div>
      </div>

      <!-- LOGOUT -->
      <div class="mt-5 text-center">
        <button id="logoutBtn" class="btn btn-danger">Logout</button>
      </div>
    </div>

    <!-- Dashboard JS -->
    <script type="module" src="assets/js/dashboard.js"></script>
  </body>
</html>
