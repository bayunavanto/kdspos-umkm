<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>POS UMKM</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <div class="container container-pos">
      <!-- Header -->
      <div
        class="pos-header d-flex justify-content-between align-items-center mb-4"
      >
        <div>
          <h1 class="pos-title">POS UMKM</h1>

          <p class="pos-subtitle">Input pesanan customer</p>
        </div>

        <button class="btn btn-danger" id="logoutBtn">Logout</button>
      </div>

      <!-- Queue Preview -->
      <div class="queue-preview">
        Antrean Berikutnya

        <div class="queue-number" id="nextQueue">&nbsp;</div>
      </div>

      <!-- Form -->
      <div class="card pos-card">
        <div class="card-body">
          <!-- Customer -->
          <div class="mb-3">
            <label class="form-label"> Nama Customer </label>

            <input
              type="text"
              id="customerName"
              class="form-control"
              placeholder="Contoh: Budi"
              autocomplete="off"
            />
          </div>

          <!-- Order Text -->
          <div class="mb-4">
            <label class="form-label"> Pesanan </label>

            <textarea
              id="orderText"
              class="form-control textarea-order"
              placeholder="Contoh:
Mie Ayam 2 
Es Teh 1 dingin"
              rows="5"
            ></textarea>
          </div>

          <!-- Order Type -->
          <div class="mb-3">
            <label class="form-label"> Jenis Order </label>

            <div class="d-flex gap-2">
              <button
                type="button"
                class="order-btn active"
                data-type="dine_in"
              >
                Makan Ditempat
              </button>

              <button type="button" class="order-btn" data-type="take_away">
                Bungkus
              </button>
            </div>
          </div>

          <!-- Button -->
          <button id="sendOrder" class="btn btn-primary btn-main w-100">
            Kirim Order
          </button>
        </div>
      </div>
    </div>

    <!-- Auth -->
    <script type="module" src="assets/js/auth.js"></script>

    <!-- POS -->
    <script type="module" src="assets/js/pos.js"></script>
  </body>
</html>
