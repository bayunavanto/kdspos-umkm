<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login POS UMKM</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <!-- Loading -->
    <div
      id="loadingScreen"
      class="vh-100 d-flex justify-content-center align-items-center"
    >
      <div class="text-center">
        <div class="spinner-border text-primary mb-3"></div>

        <p>Memuat...</p>
      </div>
    </div>

    <!-- Login -->
    <div id="loginSection" class="d-none">
      <!-- isi login sebelumnya -->
      <div
        class="container login-wrapper d-flex justify-content-center align-items-center"
      >
        <div class="card login-card p-4">
          <div class="card-body">
            <h1 class="login-title text-center">POS UMKM</h1>

            <p class="login-subtitle text-center">Login untuk melanjutkan</p>

            <!-- Email -->
            <div class="mb-3">
              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="Email"
              />
            </div>

            <!-- Password -->
            <div class="mb-3">
              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Password"
              />
            </div>

            <!-- Button -->
            <button id="loginBtn" class="btn btn-primary btn-main w-100">
              Login
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Login JS -->
    <script type="module" src="assets/js/login.js"></script>
  </body>
</html>
